<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati – Booktique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="auth-body">
<div class="auth-wrapper">
  <div class="auth-card auth-card-wide">

    <div class="auth-header">
      <div class="auth-logo"><i class="bi bi-book-fill"></i></div>
      <h1 class="auth-title">Booktique</h1>
      <p class="auth-subtitle">Crea il tuo account</p>
    </div>

    <!-- Errore globale (es. errore DB) -->
    <div th:if="${globalError}" class="alert alert-danger">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span th:text="${globalError}"></span>
    </div>

    <form th:action="@{/registrazione}"
          th:object="${registrationForm}"
          method="post" novalidate>

      <!-- Sezione: dati personali -->
      <div class="section-header">
        <i class="bi bi-person-badge-fill me-2"></i>Dati personali
      </div>

      <div class="mb-3">
        <label class="form-label">Nome completo <span class="text-danger">*</span></label>
        <input type="text"
               th:field="*{nome}"
               th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
               class="form-control"
               placeholder="Mario Rossi">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}"
             th:errors="*{nome}"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email"
               th:field="*{email}"
               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
               class="form-control"
               placeholder="mario@esempio.com">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
        <div class="form-text">Userai questa email per accedere.</div>
      </div>

      <!-- Sezione: password -->
      <div class="section-header mt-4">
        <i class="bi bi-shield-lock-fill me-2"></i>Scegli una password
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Password <span class="text-danger">*</span></label>
          <input type="password"
                 th:field="*{password}"
                 th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Minimo 6 caratteri"
                 autocomplete="new-password">
          <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Conferma password <span class="text-danger">*</span></label>
          <input type="password"
                 th:field="*{confirmPassword}"
                 th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                 class="form-control"
                 placeholder="Ripeti la password"
                 autocomplete="new-password">
          <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
               th:errors="*{confirmPassword}"></div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-auth w-100">
        <i class="bi bi-person-check-fill me-2"></i>Crea il mio account
      </button>
    </form>

    <div class="auth-divider"><span>oppure</span></div>

    <div class="text-center">
      <p class="text-muted small mb-2">Hai già un account?</p>
      <a th:href="@{/login}" class="btn btn-outline-primary w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
      </a>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
