<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center py-5" style="min-height: 100vh;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
          
          <div class="text-center mb-4">
            <div class="bg-primary text-white d-inline-flex justify-content-center align-items-center rounded-circle mb-3 shadow" style="width: 60px; height: 60px;">
                <i class="bi bi-person-plus-fill fs-2"></i>
            </div>
            <h2 class="fw-bold">Crea un Account</h2>
            <p class="text-muted">Unisciti a Booktique per iniziare i tuoi acquisti</p>
          </div>

          <div th:if="${errore}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errore}">Errore</span>
          </div>

          <form th:action="@{/registrazione}" th:object="${utente}" method="post">
            
            <div class="mb-3">
              <label class="form-label fw-semibold text-secondary small">Nome Completo</label>
              <input type="text" th:field="*{nome}" class="form-control bg-light" placeholder="Es. Mario Rossi" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold text-secondary small">Indirizzo Email</label>
              <input type="email" th:field="*{email}" class="form-control bg-light" placeholder="mario.rossi@email.com" required>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                  <label class="form-label fw-semibold text-secondary small">Password</label>
                  <input type="password" th:field="*{password}" class="form-control bg-light" placeholder="Scegli una password sicura" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mb-3">
              Completa Registrazione <i class="bi bi-check2-circle ms-1"></i>
            </button>
            
          </form>

          <div class="position-relative mt-4 mb-4 text-center">
             <hr class="text-muted">
             <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">oppure</span>
          </div>

          <div class="text-center">
            <p class="mb-2 small text-muted">Hai già un account?</p>
            <a th:href="@{/login}" class="btn btn-outline-secondary w-100 py-2">Accedi ora</a>
          </div>

        </div>
        
        <div class="card-footer bg-transparent border-0 text-center pb-4">
            <a th:href="@{/libri}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Torna al catalogo</a>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
