<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accesso Negato - Errore 403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container text-center">
        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 6rem;"></i>
        
        <h1 class="display-1 fw-bold text-dark mt-3">403</h1>
        <h2 class="h3 fw-bold text-secondary mb-3">Accesso Negato</h2>
        
        <p class="lead text-muted mb-5">
            Ops! Stai cercando di accedere a un'area riservata ai clienti.<br>
            <strong>Come Amministratore non hai un carrello o uno storico ordini.</strong>
        </p>
        
        <div class="d-flex justify-content-center gap-3">
            <a th:href="@{/libri}" class="btn btn-primary btn-lg shadow-sm">
                <i class="bi bi-arrow-left"></i> Torna al Catalogo
            </a>
            <a th:href="@{/admin/libri}" class="btn btn-outline-secondary btn-lg shadow-sm">
                Vai all'Area Gestione
            </a>
        </div>
    </div>

</body>
</html>
