<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi – Booktique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="auth-body">
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo"><i class="bi bi-book-fill"></i></div>
      <h1 class="auth-title">Booktique</h1>
      <p class="auth-subtitle">Accedi al tuo account</p>
    </div>

    <!-- Messaggi di feedback -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-sm">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span th:text="${errorMessage}"></span>
    </div>
    <div th:if="${logoutMessage}" class="alert alert-info alert-sm">
      <i class="bi bi-info-circle-fill me-2"></i>
      <span th:text="${logoutMessage}"></span>
    </div>
    <div th:if="${param.registered}" class="alert alert-success alert-sm">
      <i class="bi bi-check-circle-fill me-2"></i>
      Registrazione completata! Ora puoi accedere.
    </div>

    <!-- Form login (POST gestito da Spring Security) -->
    <form th:action="@{/login}" method="post">

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email"
               name="email"
               class="form-control"
               placeholder="la-tua-email@esempio.com"
               required autofocus autocomplete="email">
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password"
                 id="password"
                 name="password"
                 class="form-control"
                 placeholder="La tua password"
                 required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button"
                  onclick="togglePwd()">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-auth w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
      </button>
    </form>

    <div class="auth-divider"><span>oppure</span></div>

    <div class="text-center">
      <p class="text-muted small mb-2">Non hai un account?</p>
      <a th:href="@{/registrazione}" class="btn btn-outline-primary w-100">
        <i class="bi bi-person-plus-fill me-2"></i>Registrati gratis
      </a>
    </div>

    <div class="text-center mt-3">
      <a th:href="@{/libri}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Continua come ospite
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
  const el = document.getElementById('password');
  const ic = document.getElementById('eye-icon');
  el.type = el.type === 'password' ? 'text' : 'password';
  ic.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
