<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
          
          <div class="text-center mb-4">
            <div class="bg-primary text-white d-inline-flex justify-content-center align-items-center rounded-circle mb-3 shadow" style="width: 60px; height: 60px;">
                <i class="bi bi-book-fill fs-2"></i>
            </div>
            <h2 class="fw-bold">Bentornato</h2>
            <p class="text-muted">Accedi al tuo account</p>
          </div>

          <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> Credenziali non valide. Riprova.
          </div>
          <div th:if="${param.logout}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle-fill me-2"></i> Disconnessione effettuata con successo.
          </div>

          <form th:action="@{/login}" method="post">
            
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold text-secondary small">Indirizzo Email</label>
              <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                  <input type="email" id="email" name="email" class="form-control bg-light" placeholder="nome@esempio.com" required autofocus>
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-semibold text-secondary small">Password</label>
              <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                  <input type="password" id="password" name="password" class="form-control bg-light" placeholder="Inserisci la password" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mb-3">
              Accedi <i class="bi bi-box-arrow-in-right ms-1"></i>
            </button>
            
          </form>

          <div class="position-relative mt-4 mb-4 text-center">
             <hr class="text-muted">
             <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">oppure</span>
          </div>

          <div class="text-center">
            <p class="mb-2 small text-muted">Non hai ancora un account?</p>
            <a th:href="@{/registrazione}" class="btn btn-outline-primary w-100 py-2">Crea un account</a>
          </div>

        </div>
        
        <div class="card-footer bg-transparent border-0 text-center pb-4">
            <a th:href="@{/libri}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Torna al catalogo come ospite</a>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
