<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Catalogo Libri</title>
</head>

<body>

	<h1>Catalogo Libri</h1>

	<!-- Caso catalogo vuoto -->
	<div th:if="${#lists.isEmpty(books)}">
		<p>Nessun libro disponibile</p>
	</div>

	<!-- Lista libri -->
	<div th:each="book : ${books}">
		<h2 th:text="${book.title}"></h2>
		<p>Autore: <span th:text="${book.author}"></span></p>
		<p>Prezzo: <span th:text="${book.price}"></span></p>
		<hr>
	</div>

</body>

</html>
