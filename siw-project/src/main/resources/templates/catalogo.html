<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Catalogo Libri – Booktique</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" th:href="@{/libri}">📚 Booktique</a>
      <div class="navbar-nav ms-auto d-flex align-items-center gap-2">

        <!-- Solo per ADMIN -->
        <a sec:authorize="hasRole('ADMIN')"
           class="btn btn-outline-warning btn-sm"
           th:href="@{/admin/libri/new}">+ Aggiungi Libro</a>
        <a sec:authorize="hasRole('ADMIN')"
           class="btn btn-outline-light btn-sm"
           th:href="@{/admin/libri}">Pannello Admin</a>

        <!-- Solo per clienti autenticati -->
        <a sec:authorize="hasRole('USER')"
           class="btn btn-outline-light btn-sm"
           th:href="@{/cart}">
          <i class="bi bi-cart3 me-1"></i>Carrello
        </a>
        <a sec:authorize="hasRole('USER')"
           class="btn btn-outline-light btn-sm"
           th:href="@{/orders}">I miei ordini</a>

        <!-- Non loggato -->
        <a sec:authorize="isAnonymous()"
           class="btn btn-outline-light btn-sm"
           th:href="@{/login}">Accedi</a>
        <a sec:authorize="isAnonymous()"
           class="btn btn-light btn-sm"
           th:href="@{/registrazione}">Registrati</a>

        <!-- Logout (qualunque utente loggato) -->
        <form sec:authorize="isAuthenticated()"
              th:action="@{/logout}" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
        </form>

      </div>
    </div>
  </nav>

  <div class="container">

    <div class="row mb-4 align-items-center">
      <div class="col-md-6">
        <h1 class="fw-bold m-0">Catalogo Libri</h1>
      </div>
      <div class="col-md-6">
        <form th:action="@{/libri/search}" method="get" class="d-flex gap-2">
          <div class="input-group">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Cerca per titolo o autore..." required>
            <button class="btn btn-primary" type="submit">Cerca</button>
          </div>
          <a th:href="@{/libri}" class="btn btn-secondary">Resetta</a>
        </form>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(listaLibri)}"
         class="alert alert-warning text-center">
      Nessun libro disponibile.
    </div>

    <div th:unless="${#lists.isEmpty(listaLibri)}"
         class="row row-cols-1 row-cols-md-3 g-4">
      <div class="col" th:each="libro : ${listaLibri}">
        <div class="card h-100 shadow-sm">

          <div th:if="${libro.copertina != null and !libro.copertina.isEmpty()}">
            <img th:src="${libro.copertina}" class="card-img-top"
                 style="height:220px;object-fit:contain;background:#f8f9fa;padding:8px"
                 th:alt="${libro.titolo}">
          </div>
          <div th:unless="${libro.copertina != null and !libro.copertina.isEmpty()}"
               class="bg-secondary text-white text-center py-5 rounded-top" style="opacity:.6">
            <span class="fs-4">📖</span>
          </div>

          <div class="card-body d-flex flex-column">
            <h5 class="card-title fw-bold mb-1" th:text="${libro.titolo}"></h5>
            <p class="card-text text-muted small mb-3">
              di <span th:text="${libro.autore}"></span>
            </p>
            <div class="mt-auto">
              <span class="fs-5 fw-bold text-success"
                    th:text="${libro.prezzo} + ' €'"></span>
              <div class="d-grid mt-2">
                <a th:href="@{/libri/{id}(id=${libro.id})}"
                   class="btn btn-outline-primary btn-sm">Dettagli</a>
              </div>
            </div>
          </div>

          <div sec:authorize="hasRole('ADMIN')"
               class="card-footer bg-transparent d-flex justify-content-between">
            <a th:href="@{/admin/libri/edit/{id}(id=${libro.id})}"
               class="btn btn-link btn-sm text-warning p-0 fw-bold">Modifica</a>
            <a th:href="@{/admin/libri/delete/{id}(id=${libro.id})}"
               th:onclick="return confirm('Eliminare questo libro?');"
               class="btn btn-link btn-sm text-danger p-0 fw-bold">Elimina</a>
          </div>

        </div>
      </div>
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
