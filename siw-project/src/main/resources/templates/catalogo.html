<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Catalogo Libri</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" th:href="@{/libri}">Booktique</a>
      <div class="navbar-nav ms-auto d-flex align-items-center gap-2">

        <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-warning btn-sm" th:href="@{/admin/libri/new}">
          <i class="bi bi-plus-circle"></i> Aggiungi Libro
        </a>
        <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-light btn-sm" th:href="@{/admin/libri}">
          <i class="bi bi-gear"></i> Area Gestione
        </a>

        <a sec:authorize="isAuthenticated()and !hasRole('ADMIN')"class="btn btn-outline-light btn-sm" th:href="@{/cart}">
          <i class="bi bi-cart"></i> Carrello
        </a>
        <a sec:authorize="isAuthenticated()" class="btn btn-outline-light btn-sm" th:href="@{/orders}">
          <i class="bi bi-receipt"></i> I Miei Ordini
        </a>

        <a sec:authorize="isAnonymous()" class="btn btn-outline-light btn-sm" th:href="@{/login}">Accedi</a>
        <a sec:authorize="isAnonymous()" class="btn btn-primary btn-sm" th:href="@{/registrazione}">Registrati</a>

        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0 p-0">
          <button type="submit" class="btn btn-outline-danger btn-sm">Esci</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container">
    <!--
        Il catalogo è reso da un componente React (vedi /js/catalogo.js).
        Il componente recupera i libri via fetch() dalle API REST, gestisce ricerca live.
        Il bottone "Aggiungi al carrello" è un form HTML che POSTa a /cart/add/{id},
        gestito da Spring (CarrelloController).
    -->
    <div id="catalogo-react">
      <p class="text-muted">Caricamento libri...</p>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="/js/catalogo.js"></script>

</body>
</html>
