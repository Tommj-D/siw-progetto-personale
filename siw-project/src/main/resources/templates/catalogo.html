<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catalogo Libri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/libri}">📚 Libreria SIW</a>
            <div class="navbar-nav ms-auto">
                <a class="btn btn-outline-light btn-sm" th:href="@{/admin/libri/new}">+ Aggiungi Libro</a>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <div class="row mb-4 align-items-center">
            <div class="col-md-6">
                <h1 class="fw-bold m-0">Catalogo Libri</h1>
            </div>
            <div class="col-md-6">
                <form th:action="@{/libri/search}" method="get" class="d-flex gap-2">
                    <div class="input-group">
                        <input type="text" name="keyword" class="form-control" placeholder="Cerca per titolo o autore..." required>
                        <button class="btn btn-primary" type="submit">Cerca</button>
                    </div>
                    <a th:href="@{/libri}" class="btn btn-secondary">Resetta</a>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(listaLibri)}" class="alert alert-warning text-center shadow-sm" role="alert">
            <strong>Nessun libro attualmente disponibile nel catalogo o per la ricerca effettuata.</strong>
        </div>

        <div th:unless="${#lists.isEmpty(listaLibri)}" class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="libro : ${listaLibri}">
                <div class="card h-100 shadow-sm">
                    
                    <div class="bg-secondary text-white text-center py-5 rounded-top" style="opacity: 0.7;">
                        <span class="fs-4">📖 Copertina</span>
                    </div>
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold text-dark mb-1" th:text="${libro.titolo}">Titolo Libro</h5>
                        <p class="card-text text-muted small mb-3">di <span th:text="${libro.autore}">Autore</span></p>
                        
                        <div class="mt-auto">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="fs-5 fw-bold text-success" th:text="${libro.prezzo} + ' €'">0.00 €</span>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <a th:href="@{/libri/{id}(id=${libro.id})}" class="btn btn-outline-primary btn-sm">Visualizza Dettagli</a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card-footer bg-transparent d-flex justify-content-between border-top-0">
                        <a th:href="@{/admin/libri/edit/{id}(id=${libro.id})}" class="btn btn-link btn-sm text-decoration-none text-warning p-0 fw-bold">Modifica</a>
                        <a th:href="@{/admin/libri/delete/{id}(id=${libro.id})}" 
                           th:onclick="return confirm('Sei sicuro di voler eliminare questo libro?');" 
                           class="btn btn-link btn-sm text-decoration-none text-danger p-0 fw-bold">Elimina</a>
                    </div>
                    
                </div>
            </div>
        </div>
        
    </div>

</body>
</html>
