<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Catalogo Libri</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" th:href="@{/libri}">Booktique</a>
      <div class="navbar-nav ms-auto d-flex align-items-center gap-2">

        <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-warning btn-sm" th:href="@{/admin/libri/new}">
          <i class="bi bi-plus-circle"></i> Aggiungi Libro
        </a>
        <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-light btn-sm" th:href="@{/admin/libri}">
          <i class="bi bi-gear"></i> Area Gestione
        </a>

        <a sec:authorize="isAnonymous()" class="btn btn-outline-light btn-sm" th:href="@{/login}">Accedi</a>
        <a sec:authorize="isAnonymous()" class="btn btn-primary btn-sm" th:href="@{/registrazione}">Registrati</a>

        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0 p-0">
          <button type="submit" class="btn btn-outline-danger btn-sm">Esci</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container">
    <h2 class="mb-4 fw-bold">Il nostro Catalogo</h2>
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
      
      <div class="col" th:each="libro : ${libri}">
        <div class="card h-100 shadow-sm border-0">
          
          <div th:if="${libro.copertina != null && !libro.copertina.isEmpty()}" class="text-center bg-dark" style="height: 250px; overflow: hidden;">
             <img th:src="${libro.copertina}" class="img-fluid w-100 h-100" style="object-fit: cover;" alt="Copertina">
          </div>
          <div th:unless="${libro.copertina != null && !libro.copertina.isEmpty()}" class="bg-secondary text-white text-center py-5 d-flex align-items-center justify-content-center" style="height: 250px;">
            <span class="display-3"><i class="bi bi-book"></i></span>
          </div>

          <div class="card-body d-flex flex-column">
            <h5 class="card-title fw-bold mb-1 text-truncate" th:text="${libro.titolo}"></h5>
            <p class="card-text text-muted small mb-3">
              di <span th:text="${libro.autore}"></span>
            </p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fs-5 fw-bold text-success" th:text="${libro.prezzo} + ' €'"></span>
              <a th:href="@{/libri/{id}(id=${libro.id})}" class="btn btn-outline-primary btn-sm">Dettagli</a>
            </div>
          </div>

        </div>
      </div>
      <div th:if="${#lists.isEmpty(libri)}" class="col-12">
         <div class="alert alert-info text-center">Il catalogo è attualmente vuoto.</div>
      </div>

    </div>
  </div>

</body>
</html>
