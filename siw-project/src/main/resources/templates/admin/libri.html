<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Area Admin - Gestione Libri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/libri}">Booktique <span class="badge bg-warning text-dark ms-2">Admin Panel</span></a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/libri}" class="btn btn-outline-light btn-sm">Vai al Catalogo</a>
            
            <a sec:authorize="isAnonymous()" class="btn btn-outline-light btn-sm" th:href="@{/login}">Accedi</a>
            
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0 p-0">
              <button type="submit" class="btn btn-danger btn-sm">Esci</button>
            </form>
        </div>
      </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="fw-bold m-0"></i>Elenco Libri</h2>
            <a th:href="@{/admin/libri/new}" class="btn btn-success shadow-sm"><i class="bi bi-plus-lg"></i> Nuovo Libro</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle m-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Copertina</th>
                                <th>Titolo</th>
                                <th>Autore</th>
                                <th>Prezzo</th>
                                <th class="text-center pe-4">Azioni</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="libro : ${libri}">
                                <td class="ps-4 text-muted" th:text="${libro.id}">1</td>
                                <td>
                                    <img th:if="${libro.copertina != null && !libro.copertina.isEmpty()}" 
                                         th:src="${libro.copertina}" class="rounded shadow-sm" style="width: 40px; height: 60px; object-fit: cover;">
                                    <div th:unless="${libro.copertina != null && !libro.copertina.isEmpty()}" class="bg-secondary rounded d-inline-block text-center text-white" style="width: 40px; height: 60px; line-height: 60px;"><i class="bi bi-image"></i></div>
                                </td>
                                <td th:text="${libro.titolo}" class="fw-bold">Titolo</td>
                                <td th:text="${libro.autore}">Autore</td>
                                <td><span class="badge bg-success" th:text="${libro.prezzo} + ' €'"></span></td>
                                <td class="text-center pe-4">
                                    <div class="btn-group shadow-sm">
                                        <a th:href="@{/admin/libri/edit/{id}(id=${libro.id})}" class="btn btn-sm btn-outline-primary" title="Modifica"><i class="bi bi-pencil-fill"></i></a>
                                        <a th:href="@{/admin/libri/delete/{id}(id=${libro.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Sei sicuro di voler cancellare definitivamente questo libro?');" title="Elimina"><i class="bi bi-trash-fill"></i></a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(libri)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="bi bi-inbox display-4 d-block mb-3"></i>
                                    Nessun libro presente in magazzino. Inizia aggiungendone uno!
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
