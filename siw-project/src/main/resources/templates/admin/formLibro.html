<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
      <div class="container">
        <span class="navbar-brand fw-bold mb-0 h1"><i class="bi bi-gear-fill me-2"></i> Booktique Admin</span>
      </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow border-0">
                    <div class="card-header bg-white border-bottom py-4">
                        <h3 class="card-title text-center m-0 fw-bold" th:text="${libro.id != null} ? 'Modifica Libro' : 'Inserisci Nuovo Libro'">
                            Gestione Libro
                        </h3>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/admin/libri}" th:object="${libro}" method="post">
                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Titolo dell'opera <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg bg-light" th:field="*{titolo}" required placeholder="Es. Il Signore degli Anelli" />
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-7 mb-4 mb-md-0">
                                    <label class="form-label fw-bold text-secondary">Autore <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control bg-light" th:field="*{autore}" required placeholder="Es. J.R.R. Tolkien" />
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label fw-bold text-secondary">Prezzo (€) <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white">€</span>
                                        <input type="number" step="0.01" class="form-control bg-light" th:field="*{prezzo}" required placeholder="19.99" />
                                    </div>
                                </div>
                            </div>
							
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Immagine di Copertina (URL)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-link-45deg"></i></span>
                                    <input type="url" class="form-control bg-light" th:field="*{copertina}" placeholder="https://esempio.com/immagine.jpg" />
                                </div>
                                <div class="form-text">Lascia vuoto se non hai un'immagine. Verrà usata un'icona predefinita.</div>
                            </div>
                            
                            <div class="mb-5">
                                <label class="form-label fw-bold text-secondary">Descrizione / Trama</label>
                                <textarea class="form-control bg-light" th:field="*{descrizione}" rows="5" placeholder="Inserisci una breve sintesi del libro..."></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                    <i class="bi bi-save me-2"></i> Salva Libro
                                </button>
                                <a th:href="@{/admin/libri}" class="btn btn-light mt-2">Annulla e torna al magazzino</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
