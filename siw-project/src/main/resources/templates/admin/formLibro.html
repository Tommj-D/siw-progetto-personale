<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="m-4 bg-light">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card shadow-sm mt-5">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4" th:text="${libro.id != null} ? 'Modifica Libro' : 'Inserisci Nuovo Libro'">
                            Gestione Libro
                        </h2>

                        <form th:action="@{/admin/libri}" th:object="${libro}" method="post">
                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold">Titolo:</label>
                                <input type="text" class="form-control" th:field="*{titolo}" required placeholder="Es. Il Signore degli Anelli" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Autore:</label>
                                <input type="text" class="form-control" th:field="*{autore}" required placeholder="Es. J.R.R. Tolkien" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Prezzo (€):</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{prezzo}" required placeholder="Es. 19.99" />
                            </div>
							
							<div class="mb-3">
							        <label class="form-label fw-bold">Link Copertina:</label>
							        <input type="text" class="form-control" th:field="*{copertina}" placeholder="Incolla qui l'URL dell'immagine..." />
							    </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">Descrizione:</label>
                                <textarea class="form-control" th:field="*{descrizione}" rows="3" placeholder="Inserisci una breve trama..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-success w-100">Salva Libro</button>
                        </form>
                        
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a class="text-decoration-none" th:href="@{/admin/libri}">← Annulla e torna al catalogo</a>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
