<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dettagli Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/libri}">Booktique</a>
      </div>
    </nav>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <div class="mb-4">
                    <a th:href="@{/libri}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Torna al catalogo</a>
                </div>

                <div class="card shadow border-0 overflow-hidden" th:if="${libro != null}">
                    <div class="row g-0">
                        
                        <div class="col-md-5 bg-dark">
                            <img th:if="${libro.copertina != null && !libro.copertina.isEmpty()}" 
                                 th:src="${libro.copertina}" class="img-fluid w-100 h-100" style="object-fit: cover;" alt="Copertina">
                            
                            <div th:unless="${libro.copertina != null && !libro.copertina.isEmpty()}" 
                                 class="d-flex flex-column align-items-center justify-content-center h-100 text-white py-5">
                                <span class="display-1"><i class="bi bi-book"></i></span>
                                <p class="mt-3 text-uppercase small opacity-75">Nessuna Immagine</p>
                            </div>
                        </div>
                        
                        <div class="col-md-7">
                            <div class="card-body p-5 d-flex flex-column h-100">
                                <h1 class="card-title fw-bold text-dark mb-2" th:text="${libro.titolo}">Titolo del Libro</h1>
                                <p class="fs-5 text-muted mb-4">Autore: <strong th:text="${libro.autore}">Nome Autore</strong></p>
                                
                                <div class="mb-4">
                                    <span class="badge bg-success fs-4 px-4 py-2 shadow-sm" th:text="${libro.prezzo} + ' €'">0.00 €</span>
                                </div>
                                
                                <hr>
                                
                                <h5 class="fw-bold text-secondary mb-3">Descrizione:</h5>
                                <p class="card-text text-dark lh-lg" 
                                   th:text="${libro.descrizione != null && !libro.descrizione.isEmpty()} ? ${libro.descrizione} : 'Nessuna descrizione attualmente disponibile per questo libro.'">
                                    Testo della descrizione...
                                </p>

                                <div sec:authorize="hasRole('ADMIN')" class="mt-auto pt-4 border-top">
                                   <span class="text-muted small me-3">Azioni Admin:</span>
                                   <a th:href="@{/admin/libri/edit/{id}(id=${libro.id})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil"></i> Modifica</a>
                                </div>
                                
                            </div>
                        </div>
                        
                    </div>
                </div>

                <div th:if="${libro == null}" class="alert alert-danger shadow text-center p-5" role="alert">
                    <span class="display-1 d-block mb-3"></span>
                    <h4 class="alert-heading fw-bold">Libro non trovato!</h4>
                    <p class="mb-0">Il libro richiesto non esiste o è stato rimosso dal sistema.</p>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
