<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dettagli Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="mb-3">
                    <a th:href="@{/libri}" class="text-decoration-none text-muted">← Torna al catalogo</a>
                </div>

                <div class="card shadow" th:if="${libro != null}">
                    <div class="row g-0">
                        
                        <div class="col-md-4 bg-secondary text-white d-flex align-items-center justify-content-center rounded-start py-5">
                            <div class="text-center">
                                <span class="display-1">📚</span>
                                <p class="m-0 mt-2 text-uppercase small tracking-wider opacity-75">Libro</p>
                            </div>
                        </div>
                        
                        <div class="col-md-8">
                            <div class="card-body p-4">
                                <h1 class="card-title fw-bold text-dark mb-1" th:text="${libro.titolo}">Titolo del Libro</h1>
                                <p class="fs-5 text-muted mb-4">Autore: <strong th:text="${libro.autore}">Nome Autore</strong></p>
                                
                                <div class="mb-4">
                                    <span class="badge bg-success fs-5 px-3 py-2" th:text="${libro.prezzo} + ' €'">0.00 €</span>
                                </div>
                                
                                <hr>
                                
                                <h5 class="fw-bold text-secondary">Descrizione della trama:</h5>
                                <p class="card-text text-dark lh-base" 
                                   th:text="${libro.descrizione != null && !libro.descrizione.isEmpty()} ? ${libro.descrizione} : 'Nessuna descrizione attualmente disponibile per questo libro.'">
                                    Testo della descrizione...
                                </p>
                                
                            </div>
                        </div>
                        
                    </div>
                </div>

                <div th:if="${libro == null}" class="alert alert-danger shadow text-center" role="alert">
                    <h4 class="alert-heading fw-bold">Errore!</h4>
                    <p class="m-0">Il libro richiesto non esiste o è stato rimosso dal sistema.</p>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
