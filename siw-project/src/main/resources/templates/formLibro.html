<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Libro</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-container { border: 1px solid #ccc; padding: 20px; border-radius: 5px; max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .back-link { display: inline-block; margin-top: 15px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>

    <h1 th:text="${libro.id != null} ? 'Modifica Libro' : 'Inserisci Nuovo Libro'">Gestione Libro</h1>

    <div class="form-container">
        <form th:action="@{/admin/libri}" th:object="${libro}" method="post">
            
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label>Titolo:</label>
                <input type="text" th:field="*{titolo}" required placeholder="Es. Il Signore degli Anelli" />
            </div>

            <div class="form-group">
                <label>Autore:</label>
                <input type="text" th:field="*{autore}" required placeholder="Es. J.R.R. Tolkien" />
            </div>

            <div class="form-group">
                <label>Prezzo (€):</label>
                <input type="number" step="0.01" th:field="*{prezzo}" required placeholder="Es. 19.99" />
            </div>
            
            <div class="form-group">
                <label>Descrizione:</label>
                <textarea th:field="*{descrizione}" rows="4" placeholder="Inserisci una breve trama..."></textarea>
            </div>

            <button type="submit">Salva Libro</button>
        </form>
    </div>

    <a class="back-link" th:href="@{/libri}">← Annulla e torna al catalogo</a>

</body>
</html>
